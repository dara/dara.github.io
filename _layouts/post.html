<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dara Kilicoglu — Designer</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <nav class="header">
        <h1 class="title"><span>Dara Kilicoglu</span></h1>
        <a href="/">Index</a>
    </nav>
    
    <main class="post">
        <header class="intro">
            <span class="serif lg-text"><strong>{{page.title}}</strong> <sup>({{page.index}})</sup> — {{ page.description }}</span>
        </header>
        
        <div class="content">
            {{ content }}
        </div>
    </main>

    <div class="post-navigation">
        {% if page.next.url %}
        <div>
            <div>Prev</div>
            <a class="next serif lg-text reversed" href="{{page.next.url}}">{{page.next.title}}</a>
        </div>
        {% endif %}
        {% if page.previous.url %}
        <div>
            <div>Next</div>
            <a class="prev serif lg-text reversed" href="{{page.previous.url}}">{{page.previous.title}}</a>
        </div>
        {% endif %}
    </div>

    {% include footer.html %}

    <script src="/assets/app.js"></script>
</body>
</html>
