<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dara Kilicoglu — Designer</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="flex">
    <main class="post">
        <p><a href="/">{{ page.index }}</a></p>
        <h6 style="margin-bottom: 1rem">{{ page.title }}</h6>
        <p class="serif lg-text">{{ page.description }}</p>

        <div class="content">
            {{ content }}
        </div>
    </main>

    <div class="post-navigation">
        {% if page.next.url %}
        <div>
            <div>Prev</div>
            <a class="next serif lg-text" href="{{page.next.url}}">{{page.next.title}}</a>
        </div>
        {% endif %}
        {% if page.previous.url %}
        <div>
            <div>Next</div>
            <a class="prev serif lg-text" href="{{page.previous.url}}">{{page.previous.title}}</a>
        </div>
        {% endif %}
    </div>

    <nav class="footer">
        © 2024 Dara Kilicoglu <a href="#" id="back-to-top">Back to top</a>
    </nav>

    <div id="loader-wrapper">Dara Kilicoglu</div>

    <script src="/assets/app.js"></script>
</body>
</html>
